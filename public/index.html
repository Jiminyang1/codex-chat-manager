<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Codex Manager</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app">
      <header class="appbar">
        <div class="brand"><span class="logo">◆</span> Codex Manager</div>
        <nav class="tabs">
          <button class="tab active" data-view="chats" type="button">Chats</button>
          <button class="tab" data-view="config" type="button">Provider</button>
        </nav>
        <div class="appbar-actions">
          <button id="settingsBtn" class="icon-btn" type="button" title="Settings" aria-label="Settings">⚙</button>
          <button id="refreshButton" class="icon-btn" type="button" title="Refresh" aria-label="Refresh">⟳</button>
        </div>
      </header>

      <div id="settingsPop" class="popover hidden">
        <label class="field">
          <span>Codex home</span>
          <input id="codexHomeInput" type="text" autocomplete="off">
        </label>
        <p id="codexHomeLabel" class="muted-sm"></p>
      </div>

      <main id="view-chats" class="view">
        <div class="controls">
          <input id="searchInput" class="search" type="search" placeholder="Search chats by title, project, or id">
          <div class="filters">
            <select id="projectFilter" class="select" aria-label="Filter by project"></select>
            <select id="providerFilter" class="select" aria-label="Filter by provider"></select>
            <label class="chk"><input id="archivedOnly" type="checkbox"> Archived</label>
          </div>
        </div>

        <div class="listmeta">
          <span id="metaLine" class="muted-sm"></span>
          <div class="listmeta-actions">
            <button id="deleteProjectBtn" class="link danger hidden" type="button">Delete project</button>
            <button id="backupsBtn" class="link" type="button">Backups</button>
          </div>
        </div>

        <div id="backupsPanel" class="backups-panel hidden"></div>
        <div id="threadList" class="chat-list"></div>
      </main>

      <main id="view-config" class="view hidden">
        <div id="reservedBanner" class="banner hidden"></div>
        <section class="card active-card">
          <div class="card-head">
            <h2>Active provider</h2>
            <span id="configKind" class="badge">unknown</span>
          </div>
          <div id="configSummary" class="summary"></div>
          <div class="sync-row">
            <p id="syncHint" class="muted-sm"></p>
            <button id="syncButton" class="btn small" type="button">Sync chats here</button>
          </div>
        </section>

        <div id="presetCards" class="preset-row"></div>

        <details class="card collapsible">
          <summary>Advanced settings</summary>
          <form id="configForm" class="form">
            <label class="field">
              <span>Base URL</span>
              <input id="fieldBaseUrl" type="text" autocomplete="off" placeholder="https://api.openai.com/v1">
            </label>
            <div class="field-row">
              <label class="field">
                <span>Wire API</span>
                <select id="fieldWireApi" class="select">
                  <option value="responses">responses</option>
                  <option value="chat">chat</option>
                </select>
              </label>
              <label class="field">
                <span>Model</span>
                <input id="fieldModel" type="text" autocomplete="off" placeholder="gpt-5.5">
              </label>
            </div>
            <label class="field toggle-field">
              <span>Requires OpenAI auth</span>
              <span class="switch">
                <input id="fieldRequiresAuth" type="checkbox">
                <span class="slider"></span>
              </span>
            </label>
            <label class="field">
              <span>API key / bearer token</span>
              <div class="key-row">
                <input id="fieldBearerValue" type="password" autocomplete="off" placeholder="(none)">
                <button id="bearerReveal" class="icon-btn" type="button" title="Show / hide">👁</button>
              </div>
              <span class="muted-sm">Stored as <code>experimental_bearer_token</code>. Leave unchanged to keep; clear it to remove.</span>
            </label>
            <div class="form-actions">
              <button id="applyFormButton" class="btn primary" type="submit">Preview &amp; apply</button>
            </div>
          </form>
        </details>

        <details class="card collapsible">
          <summary>Profiles</summary>
          <div class="profiles-head">
            <p class="muted-sm">Named snapshots of <code>config.toml</code>.</p>
            <button id="saveProfileButton" class="link" type="button">Save current</button>
          </div>
          <div id="profileList" class="profile-list"></div>
        </details>

        <details class="card collapsible" id="rawDetails">
          <summary>Raw files — config.toml &amp; auth.json</summary>
          <div class="raw-tabs">
            <button class="raw-tab active" data-file="config" type="button">config.toml</button>
            <button class="raw-tab" data-file="auth" type="button">auth.json</button>
          </div>
          <textarea id="rawEditor" class="raw-area" spellcheck="false" autocomplete="off"></textarea>
          <div class="raw-foot">
            <span id="rawPath" class="muted-sm"></span>
            <span class="raw-foot-actions">
              <button id="rawReload" class="link" type="button">Reload</button>
              <button id="rawSave" class="btn small primary" type="button">Save</button>
            </span>
          </div>
        </details>
      </main>
    </div>

    <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-card">
        <div class="modal-head">
          <h2 id="modalTitle">Confirm</h2>
          <button id="modalClose" class="icon-btn" type="button" aria-label="Close">×</button>
        </div>
        <pre id="modalBody"></pre>
        <div class="modal-actions">
          <button id="modalCancel" class="btn ghost" type="button">Cancel</button>
          <button id="modalExecute" class="btn danger" type="button">Execute</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
