<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Codex Chat Manager</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>Codex Chat Manager</h1>
          <p id="codexHomeLabel">Loading local state...</p>
        </div>
        <div class="topbar-actions">
          <label class="home-field">
            <span>Codex home</span>
            <input id="codexHomeInput" type="text" autocomplete="off">
          </label>
          <button id="refreshButton" class="button primary" type="button">Refresh</button>
        </div>
      </header>

      <main class="workspace">
        <aside class="sidebar">
          <section class="panel">
            <div class="panel-head">
              <h2>Projects</h2>
              <span id="projectCount" class="count">0</span>
            </div>
            <div id="projectList" class="project-list"></div>
          </section>
          <section class="panel">
            <div class="panel-head">
              <h2>Providers</h2>
            </div>
            <div id="providerList" class="provider-list"></div>
          </section>
        </aside>

        <section class="content">
          <div class="status-grid" id="statusGrid"></div>

          <section class="table-panel">
            <div class="toolbar">
              <div>
                <h2>Chats</h2>
                <p id="threadScope">All active and archived chats</p>
              </div>
              <div class="toolbar-controls">
                <input id="searchInput" class="search" type="search" placeholder="Search title, cwd, id">
                <label class="check">
                  <input id="archivedOnly" type="checkbox">
                  <span>Archived</span>
                </label>
                <button id="clearFilters" class="button ghost" type="button">Clear</button>
              </div>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Chat</th>
                    <th>Project</th>
                    <th>Provider</th>
                    <th>Updated</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="threadRows"></tbody>
              </table>
            </div>
          </section>
        </section>

        <aside class="inspector">
          <section class="panel selected-panel">
            <div class="panel-head">
              <h2>Selection</h2>
            </div>
            <div id="selectionEmpty" class="empty">Select a chat or project.</div>
            <div id="selectionDetails" class="selection-details hidden"></div>
          </section>

          <section class="panel danger-panel">
            <div class="panel-head">
              <h2>Actions</h2>
            </div>
            <div class="action-stack">
              <button id="confirmTrashThread" class="button danger" type="button" disabled>Delete Chat</button>
              <button id="confirmDeleteProject" class="button danger" type="button" disabled>Delete Project</button>
            </div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <h2>Backups</h2>
              <button id="reloadBackups" class="mini" type="button">Reload</button>
            </div>
            <div id="backupList" class="backup-list"></div>
          </section>
        </aside>
      </main>
    </div>

    <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-card">
        <div class="modal-head">
          <h2 id="modalTitle">Confirm</h2>
          <button id="modalClose" class="icon-button" type="button" aria-label="Close">x</button>
        </div>
        <pre id="modalBody"></pre>
        <div class="modal-actions">
          <button id="modalCancel" class="button ghost" type="button">Cancel</button>
          <button id="modalExecute" class="button danger" type="button">Execute</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
